<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>ZC 2026 — Crew Briefing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Barlow+Condensed:wght@700;800;900&display=swap">
<style>
/* ─── RESET ───────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0c0c0c;--surf:#181818;--surf2:#222;--border:#2e2e2e;--border2:#3a3a3a;
  --text:#f0efeb;--muted:#888;--faint:#555;
  --yellow:#f5c500;--orange:#e8500a;--green:#2db872;--red:#e04545;
  --r:8px;--font:'Barlow',system-ui,sans-serif;--fontc:'Barlow Condensed',system-ui,sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--font);font-size:15px;background:var(--bg);color:var(--text);line-height:1.55;min-height:100vh;padding-bottom:40px}

/* ─── HEADER ──────────────────────────────────────────────── */
.site-header{background:#000;border-bottom:4px solid var(--yellow);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-family:var(--fontc);font-size:22px;font-weight:900;letter-spacing:1px;text-transform:uppercase;color:var(--yellow);line-height:1}
.logo small{display:block;font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-top:1px}
.header-badge{background:var(--yellow);color:#000;font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border-radius:3px}

/* ─── UPDATES BANNER ─────────────────────────────────────── */
#updates-banner{display:none;background:#111;border-left:4px solid var(--yellow);margin:16px 16px 0;border-radius:var(--r);overflow:hidden}
.update-header{padding:10px 14px 6px;display:flex;align-items:center;gap:8px}
.update-dot{width:8px;height:8px;border-radius:50%;background:var(--yellow);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.update-title{font-family:var(--fontc);font-size:13px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--yellow)}
.update-item{padding:8px 14px;border-top:1px solid var(--border)}
.update-date{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.update-text{font-size:14px;color:var(--text)}

/* ─── TABS ────────────────────────────────────────────────── */
.tabs-wrap{position:sticky;top:73px;z-index:90;background:var(--bg);border-bottom:1px solid var(--border);padding:0 16px}
.tabs{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:12px 16px;font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all .15s;margin-bottom:-1px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--yellow);border-bottom-color:var(--yellow)}
.panel{display:none;padding:20px 16px}.panel.active{display:block}

/* ─── SECTION TITLES ─────────────────────────────────────── */
.sect{font-family:var(--fontc);font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:28px 0 12px;display:flex;align-items:center;gap:10px}
.sect::after{content:'';flex:1;height:1px;background:var(--border)}
.sect:first-child{margin-top:4px}

/* ─── INFO CARDS ─────────────────────────────────────────── */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
.info-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.info-card.full{grid-column:1/-1}
.info-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.info-val{font-family:var(--fontc);font-size:20px;font-weight:800;color:var(--text);line-height:1.2}
.info-sub{font-size:12px;color:var(--muted);margin-top:3px}

/* ─── CTA BUTTONS ────────────────────────────────────────── */
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 18px;border-radius:var(--r);font-size:13px;font-weight:700;text-decoration:none;letter-spacing:.02em;transition:all .15s;border:none;cursor:pointer;white-space:nowrap}
.btn-yellow{background:var(--yellow);color:#000}
.btn-yellow:hover{background:#ffd000}
.btn-green{background:#1a3d2a;color:#2db872;border:1px solid #1e5a38}
.btn-orange{background:#2d1a0f;color:var(--orange);border:1px solid #4a2810}
.btn-ghost{background:var(--surf);color:var(--text);border:1px solid var(--border2)}
.btn-ghost:hover{border-color:var(--yellow);color:var(--yellow)}
.btn svg{width:16px;height:16px;flex-shrink:0}

/* ─── CONTACT CARDS ──────────────────────────────────────── */
.contact-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px}
.contact-info .contact-name{font-weight:700;font-size:15px}
.contact-info .contact-role{font-size:12px;color:var(--muted);margin-top:1px}
.contact-btns{display:flex;gap:6px;flex-shrink:0}
.icon-btn{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:18px;border:none;cursor:pointer}
.icon-btn.call{background:#1a3d2a}
.icon-btn.wa{background:#0d2318}

/* ─── LOCATION CARDS ─────────────────────────────────────── */
.loc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.loc-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.loc-img{width:100%;aspect-ratio:16/9;object-fit:cover;background:var(--surf2);display:flex;align-items:center;justify-content:center}
.loc-img-placeholder{width:100%;aspect-ratio:16/9;background:var(--surf2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--faint)}
.loc-img-placeholder span{font-size:28px}
.loc-img-placeholder p{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.loc-body{padding:12px}
.loc-name{font-family:var(--fontc);font-size:17px;font-weight:800;color:var(--text);margin-bottom:2px}
.loc-desc{font-size:12px;color:var(--muted);line-height:1.4}
.loc-badge{display:inline-block;margin-top:6px;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 7px;border-radius:3px;background:rgba(245,197,0,.12);color:var(--yellow)}

/* ─── RULES LIST ─────────────────────────────────────────── */
.rules-list{list-style:none;display:flex;flex-direction:column;gap:2px}
.rules-list li{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;font-size:14px;display:flex;gap:10px;align-items:flex-start;line-height:1.45}
.rules-list li .icon{flex-shrink:0;font-size:16px;margin-top:1px}
.rules-list li strong{color:var(--text)}
.rules-list li.warn .icon::before{content:"⚠️"}
.rules-list li.ok .icon::before{content:"✅"}
.rules-list li.info-li .icon::before{content:"ℹ️"}

/* ─── KLEDINGSCHEMA ──────────────────────────────────────── */
.kleding-table{width:100%;border-collapse:collapse;background:var(--surf);border-radius:var(--r);overflow:hidden;border:1px solid var(--border)}
.kleding-table th{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);padding:10px 12px;text-align:left;background:var(--surf2);border-bottom:1px solid var(--border)}
.kleding-table td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:top}
.kleding-table tr:last-child td{border-bottom:none}

/* ─── PAUZE TABEL ────────────────────────────────────────── */
.pause-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.pause-item{background:var(--surf);border:1px solid var(--border);border-radius:6px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center}
.pause-dur{font-size:13px;color:var(--muted)}
.pause-val{font-family:var(--fontc);font-size:16px;font-weight:800;color:var(--yellow)}

/* ─── TIPS ───────────────────────────────────────────────── */
.tips-list{display:flex;flex-direction:column;gap:6px}
.tip-item{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;display:flex;gap:10px;align-items:flex-start;font-size:14px;line-height:1.45}
.tip-icon{font-size:20px;flex-shrink:0}

/* ─── PAKLIJST ───────────────────────────────────────────── */
.checklist-progress{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:16px}
.progress-label{display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px}
.progress-bar-bg{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.progress-bar-fill{height:100%;background:var(--yellow);border-radius:4px;transition:width .3s}
.progress-text{font-family:var(--fontc);font-size:18px;font-weight:800;color:var(--text);margin-top:4px}
.checklist-cat{margin-bottom:20px}
.cat-title{font-family:var(--fontc);font-size:14px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.cat-title span{font-size:18px}
.check-item{display:flex;align-items:center;gap:12px;background:var(--surf);border:1px solid var(--border);border-radius:6px;padding:11px 14px;margin-bottom:4px;cursor:pointer;transition:all .15s;-webkit-user-select:none;user-select:none}
.check-item:active{transform:scale(.98)}
.check-item.done{opacity:.5}
.check-item.done .check-label{text-decoration:line-through}
.check-box{width:22px;height:22px;border:2px solid var(--border2);border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:13px}
.check-item.done .check-box{background:var(--yellow);border-color:var(--yellow);color:#000}
.check-label{font-size:14px;flex:1}
.checklist-reset{background:none;border:1px solid var(--border);color:var(--muted);padding:10px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;width:100%;margin-top:8px}

/* ─── FAQ ────────────────────────────────────────────────── */
.faq-item{border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px;overflow:hidden}
.faq-q{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;font-weight:600;font-size:14px;background:var(--surf);gap:12px}
.faq-q:active{background:var(--surf2)}
.faq-arrow{color:var(--muted);font-size:18px;flex-shrink:0;transition:transform .2s}
.faq-item.open .faq-arrow{transform:rotate(180deg)}
.faq-a{display:none;padding:12px 16px;font-size:14px;color:var(--muted);line-height:1.6;border-top:1px solid var(--border);background:#111}
.faq-item.open .faq-a{display:block}

/* ─── ZC APP CARD ────────────────────────────────────────── */
.app-card{background:linear-gradient(135deg,#1a1200 0%,var(--surf) 100%);border:1px solid #3a3000;border-radius:var(--r);padding:16px;display:flex;align-items:center;gap:16px;text-decoration:none;margin-bottom:12px}
.app-icon{width:52px;height:52px;background:var(--yellow);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.app-info .app-name{font-family:var(--fontc);font-size:18px;font-weight:800;color:var(--text)}
.app-info .app-sub{font-size:12px;color:var(--muted);margin-top:2px}
.app-info .app-cta{font-size:11px;font-weight:700;color:var(--yellow);text-transform:uppercase;letter-spacing:.05em;margin-top:6px}

/* ─── VIDEO PLACEHOLDER ──────────────────────────────────── */
.video-wrap{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:var(--r);background:var(--surf);border:1px solid var(--border);margin-bottom:12px}
.video-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0}
.video-placeholder{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--faint)}
.video-placeholder span{font-size:40px}
.video-placeholder p{font-size:12px;font-weight:600;text-align:center}

/* ─── RESPONSIVE ─────────────────────────────────────────── */
@media(max-width:400px){
  .info-grid,.loc-grid,.pause-grid{grid-template-columns:1fr}
  .info-card.full{grid-column:auto}
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════
     CONFIG — Pas hier alle jaarlijkse info aan
═══════════════════════════════════════════════════════ -->
<script>
const CONFIG = {
  year: 2026,
  eventDates: 'Do 16 t/m Zo 19 juli',
  campingOpen: 'Wo 15 juli (dag voor het event)',
  campingClose: 'Ma 20 juli om 11:00 uur',
  busInfo: 'Info volgt via de groepsapp',
  busLocation: 'Grolsch Veste, Enschede',
  festivalAddress: 'Eikendijk 9, Lichtenvoorde',
  crewPointDay: 'Achter Pizza 2 (herkenbaar op het terrein)',
  crewPointMorning: 'Witte partytent op de crewcamping',
  contacts: [
    { name: 'Pepijn de Vos', role: 'Coördinator StudentKelner', phone: '0620316979' },
    { name: 'Anouk van de Luitgaren', role: 'Coördinator StudentKelner', phone: '0642497514' }
  ],
  zcAppUrl: 'https://www.zwartecross.nl',
  videoUrl: 'https://www.youtube.com/embed/sROJxAi9Yrc',
  updates: [
    // Voeg hier updates toe, nieuwste bovenaan:
    // { date: '10 jul', text: 'De bustijd is 14:00 uur vanaf de Grolsch Veste.' },
  ]
};
</script>

<!-- ═══════════════════════════════════════════════════════
     HTML — hieronder hoef je niets aan te passen
═══════════════════════════════════════════════════════ -->

<header class="site-header">
  <div class="logo">
    Zwarte Cross
    <small>Crew Briefing <span id="hdr-year"></span></small>
  </div>
  <div class="header-badge">3D Events</div>
</header>

<div id="updates-banner">
  <div class="update-header">
    <div class="update-dot"></div>
    <div class="update-title">Updates</div>
  </div>
  <div id="updates-list"></div>
</div>

<div class="tabs-wrap">
  <div class="tabs">
    <button class="tab active" onclick="sw('info')">Info</button>
    <button class="tab" onclick="sw('werken')">Op het werk</button>
    <button class="tab" onclick="sw('paklijst')">Paklijst</button>
    <button class="tab" onclick="sw('faq')">FAQ</button>
  </div>
</div>

<div id="p-info" class="panel active"></div>
<div id="p-werken" class="panel"></div>
<div id="p-paklijst" class="panel"></div>
<div id="p-faq" class="panel"></div>

<script>
// ─── TAB SWITCHING ────────────────────────────────────────
function sw(name) {
  document.querySelectorAll('.tab').forEach(function(b,i){
    b.classList.toggle('active', ['info','werken','paklijst','faq'][i] === name);
  });
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById('p-'+name).classList.add('active');
}

// ─── INIT ─────────────────────────────────────────────────
document.getElementById('hdr-year').textContent = CONFIG.year;

// Updates banner
if (CONFIG.updates && CONFIG.updates.length > 0) {
  document.getElementById('updates-banner').style.display = 'block';
  var ul = document.getElementById('updates-list');
  CONFIG.updates.forEach(function(u) {
    ul.innerHTML += '<div class="update-item"><div class="update-date">'+u.date+'</div><div class="update-text">'+u.text+'</div></div>';
  });
}

// ─── TAB: INFO ────────────────────────────────────────────
var c = CONFIG;
var infoHTML = '';

// Event info
infoHTML += '<div class="sect">Het evenement</div>';
infoHTML += '<div class="info-grid">';
infoHTML += '<div class="info-card full"><div class="info-label">Evenementdagen</div><div class="info-val">'+c.eventDates+'</div><div class="info-sub">Camping open: '+c.campingOpen+'<br>Camping sluit: '+c.campingClose+'</div></div>';
infoHTML += '<div class="info-card full"><div class="info-label">Locatie</div><div class="info-val" style="font-size:16px">'+c.festivalAddress+'</div><div class="info-sub">Festivalterrein de Schans, Lichtenvoorde</div></div>';
infoHTML += '</div>';

// Bus
infoHTML += '<div class="sect">Bus naar het terrein</div>';
infoHTML += '<div class="info-card full" style="margin-bottom:10px"><div class="info-label">Vertrek</div><div class="info-val" style="font-size:18px">'+c.busInfo+'</div><div class="info-sub">Opstaplocatie: '+c.busLocation+'</div></div>';

// ZC App
infoHTML += '<div class="sect">Zwarte Cross App</div>';
infoHTML += '<a class="app-card" href="'+c.zcAppUrl+'" target="_blank">';
infoHTML += '<div class="app-icon">🎪</div>';
infoHTML += '<div class="app-info"><div class="app-name">Zwarte Cross App</div><div class="app-sub">Programma, plattegrond en festivalinfo</div><div class="app-cta">Openen →</div></div>';
infoHTML += '</a>';

// Video
infoHTML += '<div class="sect">Crewcamping</div>';
if (c.videoUrl) {
  infoHTML += '<div class="video-wrap"><iframe src="'+c.videoUrl+'" allowfullscreen></iframe></div>';
} else {
  infoHTML += '<div class="video-wrap"><div class="video-placeholder"><span>🎬</span><p>Video volgt — Pepijn post een rondleiding van de crewcamping</p></div></div>';
}
infoHTML += '<p style="font-size:13px;color:var(--muted);margin-bottom:16px">We overnachten op de speciale crewcamping. Tenten van 3D Events staan bij elkaar in ons eigen gebied. Sanitaire voorzieningen zijn aanwezig voor medewerkers.</p>';

// Werkplekken
infoHTML += '<div class="sect">Werkplekken</div>';
infoHTML += '<div class="loc-grid">';
var locs = [
  { name:'Campingwinkel', desc:'24 uur open supermarkt op de camping. Ontbijt, pizza, koffie en meer. Grootste locatie.', badge:'Camping', icon:'🏪' },
  { name:'Pizza 1, 2 & 3', desc:'Drie vaste Dr. Oetker pizzatenten verspreid over het festivalterrein.', badge:'Festival', icon:'🍕' },
  { name:'Pizza Crossbaan', desc:'Pizzatent bij de motorcrossbaan. Druk tijdens de crossraces.', badge:'Crossbaan', icon:'🏍️' },
  { name:'Festival All-Round', desc:'Unox karren en Ola kramen verspreid over het festivalterrein. Mobiele inzet.', badge:'Festival', icon:'🧆' },
  { name:'Unox Crossbaan', desc:'Mobiele Unox en Ola kramen bij de crossbaan.', badge:'Crossbaan', icon:'🌭' },
];
locs.forEach(function(l){
  infoHTML += '<div class="loc-card">';
  infoHTML += '<div class="loc-img-placeholder"><span>'+l.icon+'</span><p>Foto volgt</p></div>';
  infoHTML += '<div class="loc-body"><div class="loc-name">'+l.name+'</div><div class="loc-desc">'+l.desc+'</div><div class="loc-badge">'+l.badge+'</div></div>';
  infoHTML += '</div>';
});
infoHTML += '</div>';

// Tips
infoHTML += '<div class="sect">Tips & tricks voor het festival</div>';
var tips = [
  ['👟','Goede schoenen zijn alles. Je staat uren op een rij — veiligheidsschoenen of stevige werkschoenen zijn geen overkill.'],
  ['🩹','Blaarpleisters. Neem er meer mee dan je denkt nodig te hebben.'],
  ['🔋','Powerbank is essentieel. Laadpunten zijn schaars op het terrein.'],
  ['💧','Drink vóór je shift al genoeg water. Het is druk en warm, je vergeet het tijdens het werk.'],
  ['😴','Slaapmasker en oordopjes zijn onmisbaar op de crewcamping. Het wordt 's nachts nooit echt stil.'],
  ['⏱️','De wandeling naar je werkplek is minimaal 20 minuten. Reken dit altijd in — te laat starten is geen optie.'],
  ['🎒','Laat je portemonnee en waardevolle spullen in je tent. Neem alleen wat je nodig hebt.'],
  ['🧴','Zonnebrand elke dag opnieuw — ook als het bewolkt is.'],
  ['🍌','Neem een houdbare snack mee voor in je werktas. Pauzes zijn kort en eten kopen kost tijd.'],
];
infoHTML += '<div class="tips-list">';
tips.forEach(function(t){
  infoHTML += '<div class="tip-item"><div class="tip-icon">'+t[0]+'</div><div>'+t[1]+'</div></div>';
});
infoHTML += '</div>';

document.getElementById('p-info').innerHTML = infoHTML;

// ─── TAB: OP HET WERK ─────────────────────────────────────
var werkHTML = '';

// Contacten
werkHTML += '<div class="sect">Jouw aanspreekpunten</div>';
c.contacts.forEach(function(ct){
  werkHTML += '<div class="contact-card">';
  werkHTML += '<div class="contact-info"><div class="contact-name">'+ct.name+'</div><div class="contact-role">'+ct.role+'</div></div>';
  werkHTML += '<div class="contact-btns">';
  werkHTML += '<a class="icon-btn call" href="tel:+31'+ct.phone.replace(/^0/,'')+'" title="Bellen">📞</a>';
  werkHTML += '<a class="icon-btn wa" href="https://wa.me/31'+ct.phone.replace(/^0/,'')+'" target="_blank" title="WhatsApp">💬</a>';
  werkHTML += '</div></div>';
});
werkHTML += '<p style="font-size:12px;color:var(--muted);margin-bottom:4px">Coördinatiepunt overdag: <strong style="color:var(--text)">'+c.crewPointDay+'</strong></p>';
werkHTML += '<p style="font-size:12px;color:var(--muted);margin-bottom:16px">'s Ochtends: <strong style="color:var(--text)">'+c.crewPointMorning+'</strong></p>';

// Werktijden
werkHTML += '<div class="sect">Aankomst & werktijden</div>';
werkHTML += '<ul class="rules-list" style="margin-bottom:16px">';

var stored = JSON.parse(localStorage.getItem('zc_checklist') || '{}');

function saveChecklist() {
  localStorage.setItem('zc_checklist', JSON.stringify(stored));
  renderChecklist();
}

function toggleItem(key) {
  stored[key] = !stored[key];
  saveChecklist();
}

function resetChecklist() {
  if (confirm('Wil je alle vinkjes wissen?')) {
    stored = {};
    saveChecklist();
  }
}

function renderChecklist() {
  var total = 0, done = 0;
  Object.values(CHECKLIST).forEach(function(items){ total += items.length; });
  Object.values(stored).forEach(function(v){ if(v) done++; });

  var html = '<div class="checklist-progress">';
  html += '<div class="progress-label"><span>Voortgang</span><span>'+done+' / '+total+'</span></div>';
  html += '<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:'+Math.round(done/total*100)+'%"></div></div>';
  html += '<div class="progress-text">'+(done===total?'✅ Alles ingepakt!':Math.round(done/total*100)+'% klaar')+'</div>';
  html += '</div>';

  var catIcons = {'Niet vergeten 🚨':'🚨','Kleding 👕':'👕','Kamperen ⛺':'⛺','Persoonlijke verzorging 🧴':'🧴','Medicatie & EHBO 💊':'💊','Eten & drinken 🍌':'🍌','Extra's 🎒':'🎒'};

  Object.entries(CHECKLIST).forEach(function(entry){
    var cat = entry[0], items = entry[1];
    html += '<div class="checklist-cat">';
    html += '<div class="cat-title"><span>'+catIcons[cat]+'</span>'+cat.replace(/[^a-zA-Z\s&]/g,'').trim()+'</div>';
    items.forEach(function(item){
      var key = cat+'::'+item;
      var isDone = !!stored[key];
      html += '<div class="check-item'+(isDone?' done':'')+'" onclick="toggleItem('+JSON.stringify(key)+')">';
      html += '<div class="check-box">'+(isDone?'✓':'')+'</div>';
      html += '<div class="check-label">'+item+'</div>';
      html += '</div>';
    });
    html += '</div>';
  });

  html += '<button class="checklist-reset" onclick="resetChecklist()">Alles wissen en opnieuw beginnen</button>';
  document.getElementById('p-paklijst').innerHTML = html;
}
